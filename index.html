<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>3D Панорамы квартир</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    
    .controls {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    
    button {
      padding: 12px 24px;
      font-size: 18px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      cursor: pointer;
      transition: background 0.2s;
    }

    button:active {
      background: rgba(0,0,0,0.9);
    }
    
    .counter {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      z-index: 100;
    }

    /* Новый стиль для названия комнаты (в стиле кнопок) */
    .room-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      font-family: Arial, sans-serif;
      font-size: 18px;
      z-index: 100;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  
  <div class="room-title" id="room-title">Прихожая</div>
  
  <div class="counter">
    <span id="counter">1</span> / 12
  </div>
  
  <div class="controls">
    <button id="prev-btn">◀ Предыдущая</button>
    <button id="next-btn">Следующая ▶</button>
  </div>

  <!-- Добавлен черный фон для красивого затемнения при смене комнаты -->
  <a-scene background="color: #000000">
    <!-- 
      Добавлено: material="transparent: true; opacity: 1" — это позволяет 
      плавно делать панораму прозрачной при переключении
    -->
    <a-sky id="panorama-sky" 
           src="panorama_1.jpg" 
           rotation="0 -130 0" 
           material="transparent: true; opacity: 1">
    </a-sky>
    
    <!-- Камере добавлен ID и базовое значение fov для расчета зума -->
    <a-camera id="main-camera" look-controls="enabled: true" fov="80">
      <a-cursor></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    // Массив с 12 панорамами
    const panoramas = [
      'panorama_1.jpg', 'panorama_2.jpg', 'panorama_3.jpg', 'panorama_4.jpg',
      'panorama_5.jpg', 'panorama_6.jpg', 'panorama_7.jpg', 'panorama_8.jpg',
      'panorama_9.jpg', 'panorama_10.jpg', 'panorama_11.jpg', 'panorama_12.jpg'
    ];

    // Названия комнат (отредактируйте под свои нужды)
    const roomNames = [
      'Прихожая', 'Гостиная', 'Кухня', 'Спальня',
      'Детская', 'Ванная комната', 'Балкон', 'Кабинет',
      'Гардеробная', 'Коридор', 'Гостевая', 'Терраса'
    ];
    
    let currentIndex = 0;
    const skyEl = document.getElementById('panorama-sky');
    const counterSpan = document.getElementById('counter');
    const roomTitleEl = document.getElementById('room-title');
    let isTransitioning = false; // Блокировка кнопок во время анимации
    
    // Функция переключения с плавным затуханием (fade-эффект)
    function changePanorama(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      // 1. Плавно гасим текущую картинку в черный цвет (продолжительность 300 мс)
      skyEl.setAttribute('animation', 'property: material.opacity; to: 0; dur: 300; easing: easeInOutQuad');

      setTimeout(() => {
        // 2. Меняем источник картинки, название комнаты и счетчик, пока экран темный
        skyEl.setAttribute('src', panoramas[index]);
        roomTitleEl.textContent = roomNames[index];
        counterSpan.textContent = index + 1;

        // 3. Плавно возвращаем прозрачность обратно (даем 100 мс на прогрузку текстуры перед показом)
        setTimeout(() => {
          skyEl.setAttribute('animation', 'property: material.opacity; to: 1; dur: 300; easing: easeInOutQuad');
          
          setTimeout(() => {
            isTransitioning = false; // Разблокируем переключение
          }, 300);
        }, 100);

      }, 300);
    }
    
    document.getElementById('prev-btn').onclick = () => {
      currentIndex = (currentIndex - 1 + panoramas.length) % panoramas.length;
      changePanorama(currentIndex);
    };
    
    document.getElementById('next-btn').onclick = () => {
      currentIndex = (currentIndex + 1) % panoramas.length;
      changePanorama(currentIndex);
    };
    
    // --- Зум двумя пальцами (Pinch-to-zoom) ---
    let initialPinchDistance = null;
    let initialFov = null;
    const cameraEl = document.getElementById('main-camera');

    document.body.addEventListener('touchstart', (e) => {
      // Если на экране два пальца
      if (e.touches.length === 2) {
        // Вычисляем начальное расстояние между ними
        initialPinchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
        initialFov = parseFloat(cameraEl.getAttribute('fov')) || 80;
      }
    }, { passive: true });

    document.body.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialPinchDistance) {
        // Вычисляем текущее расстояние
        const currentPinchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
        
        // Считаем коэффициент изменения расстояния
        const zoomFactor = initialPinchDistance / currentPinchDistance;
        let newFov = initialFov * zoomFactor;

        // Ограничиваем уровень зума (от 20 - сильное приближение, до 100 - отдаление)
        newFov = Math.max(20, Math.min(newFov, 100));
        
        cameraEl.setAttribute('fov', newFov);
      }
    }, { passive: true });

    document.body.addEventListener('touchend', (e) => {
      // Если пальцев стало меньше двух, сбрасываем зум-переменные
      if (e.touches.length < 2) {
        initialPinchDistance = null;
      }
    });

  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>3D Панорамы квартир</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; }
    
    .controls {
      position: fixed;
      bottom: 30px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    
    button {
      padding: 12px 24px;
      font-size: 18px;
      background: rgba(0,0,0,0.7);
      color: white;
      border: none;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      cursor: pointer;
      transition: background 0.2s;
    }

    button:active {
      background: rgba(0,0,0,0.9);
    }
    
    .counter {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-family: Arial, sans-serif;
      z-index: 100;
    }

    .room-title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 24px;
      border-radius: 30px;
      backdrop-filter: blur(5px);
      font-family: Arial, sans-serif;
      font-size: 18px;
      z-index: 100;
      text-align: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  
  <div class="room-title" id="room-title">Прихожая</div>
  
  <div class="counter">
    <span id="counter">1</span> / 14
  </div>
  
  <div class="controls">
    <button id="prev-btn">◀ Предыдущая</button>
    <button id="next-btn">Следующая ▶</button>
  </div>

  <a-scene background="color: #000000">
    <a-sky id="panorama-sky" 
           src="panorama_1.jpg" 
           rotation="0 -130 0" 
           material="transparent: true; opacity: 1">
    </a-sky>
    
    <a-camera id="main-camera" look-controls="enabled: true" fov="80">
      <a-cursor></a-cursor>
    </a-camera>
  </a-scene>

  <script>
    const panoramas = [
      'panorama_1.jpg', 'panorama_2.jpg', 'panorama_3.jpg', 'panorama_4.jpg',
      'panorama_5.jpg', 'panorama_6.jpg', 'panorama_7.jpg', 'panorama_8.jpg',
      'panorama_9.jpg', 'panorama_10.jpg', 'panorama_11.jpg', 'panorama_12.jpg',
      'panorama_13.jpg' ,'panorama_14.jpg'
    ];

    const roomNames = [
      'Семьянин', 'Традиционалист', 'Скептик', 'Карьерист',
      'Выживальщик', 'Прогрессист', 'Патриот', 'Активист',
      'Мечтатель', 'Сетевик', 'Ностальгист', 'Эколог',
      'Новатор', 'Цифровой кочевник'
    ];
    
    let currentIndex = 0;
    const skyEl = document.getElementById('panorama-sky');
    const counterSpan = document.getElementById('counter');
    const roomTitleEl = document.getElementById('room-title');
    let isTransitioning = false; 
    
    function changePanorama(index) {
      if (isTransitioning) return;
      isTransitioning = true;

      roomTitleEl.textContent = roomNames[index];
      counterSpan.textContent = index + 1;

      skyEl.setAttribute('animation', 'property: material.opacity; to: 0; dur: 300; easing: easeInOutQuad');

      setTimeout(() => {
        const imgLoader = new Image();
        
        imgLoader.onload = () => {
          skyEl.setAttribute('src', panoramas[index]);
          
          setTimeout(() => {
            skyEl.setAttribute('animation', 'property: material.opacity; to: 1; dur: 300; easing: easeInOutQuad');
            
            setTimeout(() => {
              isTransitioning = false;
            }, 300);
          }, 50);
        };

        imgLoader.src = panoramas[index];

      }, 300);
    }
    
    document.getElementById('prev-btn').onclick = () => {
      currentIndex = (currentIndex - 1 + panoramas.length) % panoramas.length;
      changePanorama(currentIndex);
    };
    
    document.getElementById('next-btn').onclick = () => {
      currentIndex = (currentIndex + 1) % panoramas.length;
      changePanorama(currentIndex);
    };
    
    // --- Зум двумя пальцами с авто-возвратом ---
    let initialPinchDistance = null;
    let initialFov = null;
    let zoomAnimationId = null; // Переменная для хранения анимации возврата
    const cameraEl = document.getElementById('main-camera');

    document.body.addEventListener('touchstart', (e) => {
      if (e.touches.length === 2) {
        // Если пальцы снова на экране, отменяем анимацию авто-возврата
        if (zoomAnimationId) {
          cancelAnimationFrame(zoomAnimationId);
        }
        
        initialPinchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
        initialFov = parseFloat(cameraEl.getAttribute('fov')) || 80;
      }
    }, { passive: true });

    document.body.addEventListener('touchmove', (e) => {
      if (e.touches.length === 2 && initialPinchDistance) {
        const currentPinchDistance = Math.hypot(
          e.touches[0].pageX - e.touches[1].pageX,
          e.touches[0].pageY - e.touches[1].pageY
        );
        
        const zoomFactor = initialPinchDistance / currentPinchDistance;
        let newFov = initialFov * zoomFactor;

        // Ограничиваем уровень зума
        newFov = Math.max(20, Math.min(newFov, 100));
        
        cameraEl.setAttribute('fov', newFov);
      }
    }, { passive: true });

    document.body.addEventListener('touchend', (e) => {
      // Если убрали хотя бы один палец
      if (e.touches.length < 2) {
        initialPinchDistance = null;
        
        // Функция для плавного возврата камеры в исходное положение (fov = 80)
        const resetZoom = () => {
          let currentFov = parseFloat(cameraEl.getAttribute('fov')) || 80;
          
          // Если уже почти вернулись к 80, ставим точно 80 и останавливаемся
          if (Math.abs(currentFov - 80) < 0.5) {
            cameraEl.setAttribute('fov', 80);
            return;
          }
          
          // Высчитываем плавное приближение к 80 (lerp)
          let newFov = currentFov + (80 - currentFov) * 0.1;
          cameraEl.setAttribute('fov', newFov);
          
          // Запускаем следующий кадр анимации
          zoomAnimationId = requestAnimationFrame(resetZoom);
        };
        
        // Запускаем процесс возврата
        resetZoom();
      }
    });

  </script>
</body>
</html>
